<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Snake (WASD Edition - Balanced Speed)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin: 0 0 5px 0;
            color: #10b981;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        p {
            margin: 0 0 20px 0;
            color: #94a3b8;
            font-size: 1rem;
        }

        .score-board {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #1e293b;
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .score-box span {
            color: #38bdf8;
        }

        .high-score-box span {
            color: #f43f5e;
        }

        #game-wrapper {
            position: relative;
            background-color: #1e293b;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 4px solid #334155;
        }

        canvas {
            display: block;
            background-color: #020617;
            border-radius: 6px;
        }

        /* Game Over Screen Overlay */
        #overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-align: center;
        }

        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #overlay h2 {
            font-size: 2.5rem;
            color: #ef4444;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        #overlay p {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin: 0 0 20px 0;
        }

        #restart-btn {
            background-color: #10b981;
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        #restart-btn:hover {
            background-color: #34d399;
            transform: scale(1.05);
        }

        #restart-btn:active {
            transform: scale(0.98);
        }

        .controls-hint {
            margin-top: 20px;
            color: #64748b;
            font-size: 0.9rem;
            display: flex;
            gap: 15px;
        }

        .key-badge {
            background: #1e293b;
            border: 1px solid #475569;
            padding: 2px 8px;
            border-radius: 4px;
            color: #cbd5e1;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Snake</h1>
    <p>Use <span class="key-badge">W</span> <span class="key-badge">A</span> <span class="key-badge">S</span> <span class="key-badge">D</span> to move and feed your snake!</p>

    <div class="score-board">
        <div class="score-box">SCORE: <span id="current-score">0</span></div>
        <div class="high-score-box">BEST: <span id="high-score">0</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="overlay">
            <h2 id="overlay-title">GAME OVER</h2>
            <p id="overlay-desc">Press any WASD key to try again!</p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <div class="controls-hint">
        <span><b style="color: #10b981;">W</b> Up</span>
        <span><b style="color: #10b981;">A</b> Left</span>
        <span><b style="color: #10b981;">S</b> Down</span>
        <span><b style="color: #10b981;">D</b> Right</span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('current-score');
        const highScoreEl = document.getElementById('high-score');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const restartBtn = document.getElementById('restart-btn');

        // Grid parameters
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // --- CALIBRATED SLOWER GAME SPEED VARIABLES ---
        const initialSpeed = 150; // Slower tick rate (150ms per frame instead of 100ms)
        const speedStep = 0.8;    // Much gentler acceleration curve per apple eaten
        const minSpeed = 70;      // Caps the speed so it never gets insanely fast

        // Game State Variables
        let snake = [];
        let apple = { x: 0, y: 0 };
        let velocity = { x: 0, y: 0 };
        let nextVelocity = { x: 0, y: 0 }; 
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = initialSpeed;
        let gameLoopId = null;
        let gameActive = false;
        let waitingForStart = true;

        highScoreEl.textContent = highScore;

        // Start Up Game setup
        initGame();

        function initGame() {
            // Place snake in center
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            
            // Set static initial directions
            velocity = { x: 0, y: 0 };
            nextVelocity = { x: 0, y: 0 };
            
            score = 0;
            scoreEl.textContent = score;
            gameSpeed = initialSpeed;
            waitingForStart = true;
            gameActive = true;
            
            spawnApple();
            hideGameOver();
            
            // Initial render loop (draws frame while waiting for starting key)
            if (gameLoopId) clearTimeout(gameLoopId);
            runGame();
        }

        function runGame() {
            if (!gameActive) return;

            update();
            draw();

            gameLoopId = setTimeout(runGame, gameSpeed);
        }

        // Logic loop
        function update() {
            if (waitingForStart) return;

            // Commit direction choice safely
            velocity = { ...nextVelocity };

            // Advance head position 
            const newHead = {
                x: snake[0].x + velocity.x,
                y: snake[0].y + velocity.y
            };

            // Wall Collisions
            if (newHead.x < 0 || newHead.x >= tileCount || newHead.y < 0 || newHead.y >= tileCount) {
                endGame();
                return;
            }

            // Self Collisions (Check tail coordinates)
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
                    endGame();
                    return;
                }
            }

            // Move the snake head
            snake.unshift(newHead);

            // Apple eating collision
            if (newHead.x === apple.x && newHead.y === apple.y) {
                score += 10;
                scoreEl.textContent = score;
                
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }

                // Gradually scale up gameplay speed
                gameSpeed = Math.max(minSpeed, initialSpeed - (score / 10) * speedStep);
                
                spawnApple();
            } else {
                // Keep the length identical by popping tail off
                snake.pop();
            }
        }

        // Canvas Rendering loop
        function draw() {
            // Draw slate floor board background
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw clean subtle gridlines
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw glowing Crimson Apple
            ctx.fillStyle = '#ef4444';
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            const radius = gridSize / 2 - 2;
            const appleX = apple.x * gridSize + gridSize / 2;
            const appleY = apple.y * gridSize + gridSize / 2;
            ctx.arc(appleX, appleY, radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Clean up shadows for performance
            ctx.shadowBlur = 0;

            // Draw Snake
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                
                if (isHead) {
                    // Smooth neon green snake head
                    ctx.fillStyle = '#10b981';
                } else {
                    // Darker gradient green body segments
                    const ratio = index / snake.length;
                    ctx.fillStyle = `rgb(${16 + (ratio * 15)}, ${185 - (ratio * 50)}, ${129 - (ratio * 30)})`;
                }

                // Segment rounded block margins
                const margin = isHead ? 1 : 2;
                const size = gridSize - (margin * 2);
                
                ctx.fillRect(
                    segment.x * gridSize + margin, 
                    segment.y * gridSize + margin, 
                    size, 
                    size
                );

                // Quick aesthetic eyes for the head segment
                if (isHead && (velocity.x !== 0 || velocity.y !== 0 || waitingForStart)) {
                    ctx.fillStyle = '#0f172a';
                    const eyeSize = 3;
                    
                    // Place eyes dynamically based on travel direction
                    if (velocity.x !== 0) { // Horizontal movement
                        ctx.fillRect(segment.x * gridSize + 10, segment.y * gridSize + 4, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 10, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else { // Vertical or Idle movement
                        ctx.fillRect(segment.x * gridSize + 4, segment.y * gridSize + 10, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 10, eyeSize, eyeSize);
                    }
                }
            });

            // "Press any WASD key to start" overlay text
            if (waitingForStart) {
                ctx.fillStyle = 'rgba(15, 23, 42, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#f8fafc';
                ctx.font = "bold 16px 'Segoe UI', Arial";
                ctx.textAlign = 'center';
                ctx.fillText("PRESS 'W' 'A' 'S' or 'D' TO START", canvas.width / 2, canvas.height / 2);
            }
        }

        function spawnApple() {
            let onSnake = true;
            while (onSnake) {
                apple.x = Math.floor(Math.random() * tileCount);
                apple.y = Math.floor(Math.random() * tileCount);
                onSnake = snake.some(seg => seg.x === apple.x && seg.y === apple.y);
            }
        }

        // Global Keydown Keyboard Handler (Specifically WASD Map)
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            // Return if unrelated keys pressed
            if (!['w', 'a', 's', 'd'].includes(key)) return;

            // Prevent browser window page scrolling with navigation keys
            e.preventDefault();

            if (!gameActive) return;

            if (waitingForStart) {
                waitingForStart = false;
            }

            // WASD directions: W=Up, S=Down, A=Left, D=Right
            switch (key) {
                case 'w':
                    if (velocity.y !== 1) { // Block turning back down into self
                        nextVelocity = { x: 0, y: -1 };
                    }
                    break;
                case 's':
                    if (velocity.y !== -1) { // Block turning back up
                        nextVelocity = { x: 0, y: 1 };
                    }
                    break;
                case 'a':
                    if (velocity.x !== 1) { // Block turning right
                        nextVelocity = { x: -1, y: 0 };
                    }
                    break;
                case 'd':
                    if (velocity.x !== -1) { // Block turning left
                        nextVelocity = { x: 1, y: 0 };
                    }
                    break;
            }
        });

        function endGame() {
            gameActive = false;
            if (gameLoopId) clearTimeout(gameLoopId);
            
            overlayTitle.textContent = "GAME OVER";
            overlayDesc.textContent = `You scored ${score} points!`;
            overlay.classList.add('active');
        }

        function hideGameOver() {
            overlay.classList.remove('active');
        }

        // Restart click bindings
        restartBtn.addEventListener('click', initGame);

        // Fallback option to quickly press Space or Enter inside Game Over Screen
        window.addEventListener('keydown', (e) => {
            if (!gameActive && (e.key === ' ' || e.key === 'Enter')) {
                initGame();
            }
        });
    </script>
</body>
</html>
